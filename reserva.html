<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iTurismo | Reservar Passeio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Poppins;background:#f3f5f7;margin:0}
.container{max-width:900px;margin:auto;background:#fff;padding:40px;border-radius:10px;margin-top:40px}
h1{margin-top:0}
label{font-weight:500;margin-top:15px;display:block}
select,input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;margin-top:5px}
.total{font-size:26px;color:#2f9e44;margin-top:20px}
button{background:#2f9e44;color:#fff;border:none;padding:14px;border-radius:6px;margin-top:20px;width:100%;cursor:pointer}
#map{height:300px;margin-top:20px;border-radius:8px}
.pix{display:none;text-align:center;margin-top:20px}
.dashboard{margin-top:50px}
.card{background:#fafafa;padding:20px;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h1>Reservar Passeio</h1>

<label>Passeio</label>
<select id="tour">
<option value="">Selecione</option>
<option value="60">Pipa - R$60</option>
<option value="60">Passeio das Águas - R$60</option>
<option value="180">Rio do Fogo - R$180</option>
<option value="180">Maracajaú - R$180</option>
<option value="90">Genipabu - R$90</option>
<option value="150">João Pessoa - R$150</option>
<option value="120">Cunhaú - R$120</option>
<option value="180">Galinhos - R$180</option>
<option value="150">São Miguel do Gostoso - R$150</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Pessoas</label>
<input type="number" id="pessoas" value="1" min="1">

<label>Nome</label>
<input id="nome">

<label>WhatsApp</label>
<input id="telefone">

<div class="total">Total: R$ <span id="total">0</span></div>

<h3>Pagamento</h3>
<label><input type="radio" name="pay" value="Dinheiro"> Dinheiro</label>
<label><input type="radio" name="pay" value="Pix" onchange="mostrarPix()"> Pix</label>
<label><input type="radio" name="pay" value="Cartao"> Cartão no embarque</label>

<div class="pix" id="pix">
<h3>Pagar com Pix</h3>
<div id="qrcode"></div>
<p>Chave Pix: +55 84 9866-8090</p>
</div>

<h3>Localização do Hotel</h3>
<div id="map"></div>
<button onclick="getLocation()">Usar minha localização</button>

<input type="hidden" id="coords">

<button onclick="reservar()">Confirmar Reserva</button>



<script>

const capacidade=20

function calc(){
let v=document.getElementById('tour').value
let p=document.getElementById('pessoas').value
if(!v)return
let t=v*p

document.getElementById('total').innerText=t
QRCode.toCanvas(t.toString(),{width:200},(e,c)=>{
let q=document.getElementById('qrcode')
q.innerHTML=""
q.appendChild(c)
})
}

document.getElementById('tour').addEventListener('change',calc)
document.getElementById('pessoas').addEventListener('input',calc)

function mostrarPix(){
document.getElementById('pix').style.display='block'
}

var map=L.map('map').setView([-5.7945,-35.211],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

var marker

map.on('click',e=>{
if(marker)map.removeLayer(marker)
marker=L.marker(e.latlng).addTo(map)

document.getElementById('coords').value=e.latlng.lat+','+e.latlng.lng
})

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude
let lng=pos.coords.longitude

if(marker)map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)

map.setView([lat,lng],15)

document.getElementById('coords').value=lat+','+lng
})
}

function reservar(){

let reserva={

tour:document.getElementById('tour').options[document.getElementById('tour').selectedIndex].text,

data:document.getElementById('data').value,

nome:document.getElementById('nome').value,

telefone:document.getElementById('telefone').value,

pessoas:document.getElementById('pessoas').value,

total:document.getElementById('total').innerText,

coords:document.getElementById('coords').value

}

let banco=JSON.parse(localStorage.getItem('reservas')||"[]")

let ocupacao=banco.filter(r=>r.data==reserva.data && r.tour==reserva.tour)
.reduce((s,r)=>s+Number(r.pessoas),0)

if(ocupacao+Number(reserva.pessoas)>capacidade){
alert('Passeio lotado nessa data')
return
}

banco.push(reserva)
localStorage.setItem('reservas',JSON.stringify(banco))

alert('Reserva confirmada')

let msg=`Reserva iTurismo\n\n${reserva.tour}\nData: ${reserva.data}\nPessoas: ${reserva.pessoas}\nTotal: R$${reserva.total}\nLocal: https://maps.google.com/?q=${reserva.coords}`

window.open("https://wa.me/558498668090?text="+encodeURIComponent(msg))

mostrarReservas()

}

function mostrarReservas(){

let banco=JSON.parse(localStorage.getItem('reservas')||"[]")

let div=document.getElementById('reservas')

div.innerHTML=""

banco.forEach(r=>{

let el=document.createElement('div')

el.className='card'

el.innerHTML=`
<b>${r.tour}</b><br>
Data: ${r.data}<br>
Pessoas: ${r.pessoas}<br>
Total: R$${r.total}
`

div.appendChild(el)

})

}

mostrarReservas()

</script>

</body>
</html>
